<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Imposter Ordspill</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preload" href="assets/party-cards.svg?v=7" as="image" />
    <link rel="stylesheet" href="styles.css?v=7" />
    <style>
      :root { --ink:#161616; --muted:#315b5c; --accent:#00a7b5; --mint:#4ff0d1; --sun:#f7f06d; }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 20% 10%, rgba(79,240,209,.72), transparent 34%), radial-gradient(circle at 88% 22%, rgba(247,240,109,.76), transparent 28%), repeating-linear-gradient(135deg, rgba(0,167,181,.2) 0 10px, transparent 10px 22px), #c8fff4; }
      button, input, textarea { font: inherit; }
      .app { min-height: 100svh; width: min(100%, 520px); margin: 0 auto; padding: 18px; }
      .screen, .setup, .field, .custom-builder, .player-list { display: grid; gap: 14px; }
      .topbar, .brand, .label-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .brand { justify-content: flex-start; font-weight: 950; }
      .mark { display: grid; place-items: center; width: 38px; height: 38px; border: 2px solid var(--ink); border-radius: 8px; background: linear-gradient(135deg, var(--mint), var(--sun)); box-shadow: 3px 3px 0 var(--ink); font-weight: 950; }
      .pill { display: inline-flex; align-items: center; justify-content: center; min-height: 32px; padding: 7px 10px; border: 2px solid var(--ink); border-radius: 999px; background: #fff; font-weight: 900; }
      .hero { display: grid; gap: 14px; padding-top: 12px; }
      h1, h2, h3, p { margin: 0; }
      h1 { max-width: 11ch; font-size: clamp(2.5rem, 14vw, 4.5rem); line-height: .88; text-transform: uppercase; letter-spacing: 0; }
      h2 { font-size: 1.9rem; line-height: 1; }
      .lead { color: var(--muted); font-size: 1.04rem; line-height: 1.48; }
      .panel { background: rgba(255,255,255,.92); border: 3px solid #161616; border-radius: 8px; box-shadow: 7px 7px 0 #161616; padding: 16px; }
      .hero-art { display: block; width: 100%; aspect-ratio: 12 / 7; max-height: 260px; object-fit: cover; border: 3px solid var(--ink); border-radius: 8px; box-shadow: 7px 7px 0 var(--ink); }
      .category-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .category-card { width: 100%; min-height: 106px; display: grid; gap: 5px; text-align: left; padding: 12px; border: 2px solid #161616; border-radius: 8px; background: #d6fff6; box-shadow: 4px 4px 0 #161616; }
      .category-card span { display: block; }
      .category-name { font-weight: 950; }
      .category-vibe, .category-count, .hint { color: #315b5c; font-weight: 800; }
      .stepper { display: grid; grid-template-columns: 48px 1fr 48px; gap: 10px; }
      .count { display: grid; place-items: center; background: #fff; font-size: 1.25rem; }
      .count, .icon-btn, .primary-btn, .danger-btn, .ghost-btn { min-height: 48px; border: 2px solid #161616; border-radius: 8px; font-weight: 950; }
      .icon-btn { color: #fff; background: #161616; box-shadow: 4px 4px 0 rgba(22,22,22,.28); }
      .primary-btn { background: linear-gradient(135deg, #00a7b5, #4ff0d1); box-shadow: 4px 4px 0 #161616; }
      .player-list { display: grid; gap: 10px; }
      .player-row { display: grid; grid-template-columns: 28px 1fr; align-items: center; gap: 9px; }
      .avatar { display: grid; place-items: center; width: 28px; height: 28px; border: 2px solid var(--ink); border-radius: 8px; background: linear-gradient(135deg, var(--sun), var(--mint)); font-size: .85rem; font-weight: 950; box-shadow: 2px 2px 0 var(--ink); }
      input, textarea { width: 100%; min-height: 44px; border: 2px solid #161616; border-radius: 8px; padding: 10px; background: #fff; color: var(--ink); }
      .custom-builder { display: grid; gap: 10px; padding: 14px; border: 2px solid var(--ink); border-radius: 8px; background: #eafffb; }
      @media (max-width: 420px) { .category-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="app" id="app"></main>
    <script src="app.js?v=7"></script>
  </body>
</html>
